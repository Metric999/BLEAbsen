name: ble_absen
description: Sistem Informasi Absensi Perkuliahan Berbasis IoT dengan BLE Beacon
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──
  dio: ^5.4.0

  # ── BLE Scanning ──
  flutter_blue_plus: ^1.31.0

  # ── Secure Token Storage ──
  flutter_secure_storage: ^9.0.0

  # ── State Management (sederhana, tanpa boilerplate provider) ──
  provider: ^6.1.0

  # ── Utilities ──
  intl: ^0.19.0
  permission_handler: ^11.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true